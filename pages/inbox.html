<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Connect | Inbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/community.css" />
  <link rel="stylesheet" href="../css/inbox.css" />
</head>
<body>
  <header class="app-nav">
    <div class="app-nav-inner">
      <a href="community.html" class="nav-brand"><svg width="26" height="26" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="url(#in1)" stroke-width="2"/><path d="M8 10L14 6L20 10L20 18L14 22L8 18Z" fill="url(#in2)" opacity="0.9"/><path d="M11 14L13 16L17 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="in1" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient><linearGradient id="in2" x1="8" y1="6" x2="20" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs></svg><span>Tech<strong>Connect</strong></span></a>
      <div style="flex:1"></div>
      <div class="nav-right">
        <a href="community.html" class="nav-icon-btn" title="Home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
        <a href="chat.html" class="nav-icon-btn" title="Chat"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></a>
        <a href="inbox.html" class="nav-icon-btn active" title="Inbox"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></a>
        <div class="nav-avatar" id="nav-avatar" style="cursor:pointer" onclick="window.location.href='profile.html'">?</div>
      </div>
    </div>
  </header>

  <div class="inbox-layout">
    <div class="inbox-sidebar">
      <div class="inbox-sidebar-header">
        <h2>Inbox</h2>
        <button class="mark-all-btn" id="mark-all-btn">Mark all read</button>
      </div>
      <div class="inbox-tabs">
        <button class="inbox-tab active" data-tab="notifications">Notifications <span class="inbox-count" id="notif-tab-count"></span></button>
        <button class="inbox-tab" data-tab="messages">Messages</button>
      </div>
    </div>

    <div class="inbox-main">
      <!-- Notifications panel -->
      <div id="panel-notifications" class="inbox-panel">
        <div class="inbox-list" id="notif-list"></div>
      </div>
      <!-- Messages panel -->
      <div id="panel-messages" class="inbox-panel" style="display:none">
        <div class="inbox-list" id="msg-list">
          <div class="inbox-item" onclick="window.location.href='chat.html?u=quantum_coder881'">
            <div class="inbox-avatar" style="background:linear-gradient(135deg,#10b981,#06b6d4)">MJ</div>
            <div class="inbox-content">
              <div class="inbox-item-header"><strong>Marcus Johnson</strong><span>3m ago</span></div>
              <div class="inbox-preview">Did you try TensorRT as well? We got 68% gains.</div>
            </div>
            <div class="unread-dot"></div>
          </div>
          <div class="inbox-item" onclick="window.location.href='chat.html?u=stellar_dev247'">
            <div class="inbox-avatar" style="background:linear-gradient(135deg,#a855f7,#6366f1)">PS</div>
            <div class="inbox-content">
              <div class="inbox-item-header"><strong>Priya Sharma</strong><span>1h ago</span></div>
              <div class="inbox-preview">Congrats on the launch! The WebSocket support is 🔥</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/inbox.js"></script>
</body>
</html>
