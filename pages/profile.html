<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Connect | Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/community.css" />
  <link rel="stylesheet" href="../css/profile.css" />
</head>
<body>
  <header class="app-nav">
    <div class="app-nav-inner">
      <a href="community.html" class="nav-brand"><svg width="26" height="26" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="url(#pn1)" stroke-width="2"/><path d="M8 10L14 6L20 10L20 18L14 22L8 18Z" fill="url(#pn2)" opacity="0.9"/><path d="M11 14L13 16L17 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="pn1" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient><linearGradient id="pn2" x1="8" y1="6" x2="20" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs></svg><span>Tech<strong>Connect</strong></span></a>
      <div style="flex:1"></div>
      <div class="nav-right">
        <a href="community.html" class="nav-icon-btn" title="Home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
        <a href="chat.html" class="nav-icon-btn" title="Chat"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></a>
        <a href="inbox.html" class="nav-icon-btn" title="Inbox"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></a>
        <div class="nav-avatar" id="nav-avatar" style="cursor:pointer" onclick="window.location.href='profile.html'">?</div>
      </div>
    </div>
  </header>

  <div class="profile-layout">
    <!-- Profile Header -->
    <div class="profile-banner" id="profile-banner"></div>
    <div class="profile-header" id="profile-header">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profile-avatar">?</div>
        <div class="online-indicator"></div>
      </div>
      <div class="profile-info">
        <div class="profile-name-row">
          <h1 id="profile-name">Loading...</h1>
          <div class="profile-badges" id="profile-badges"></div>
        </div>
        <div class="profile-username" id="profile-username">@...</div>
        <p class="profile-bio" id="profile-bio"></p>
        <div class="profile-stats">
          <div class="pstat"><strong id="pstat-karma">0</strong><span>TKPoints</span></div>
          <div class="pstat"><strong id="pstat-posts">0</strong><span>Posts</span></div>
          <div class="pstat"><strong id="pstat-followers">0</strong><span>Followers</span></div>
          <div class="pstat"><strong id="pstat-following">0</strong><span>Following</span></div>
        </div>
      </div>
      <div class="profile-actions" id="profile-actions"></div>
    </div>

    <div class="profile-body">
      <!-- Posts -->
      <div class="profile-main">
        <div class="profile-tabs">
          <button class="profile-tab active" data-tab="posts">Posts</button>
          <button class="profile-tab" data-tab="comments">Comments</button>
        </div>
        <div id="profile-posts-panel" class="profile-panel">
          <div id="profile-posts-list"></div>
        </div>
        <div id="profile-comments-panel" class="profile-panel" style="display:none">
          <div id="profile-comments-list"></div>
        </div>
      </div>

      <!-- About sidebar -->
      <div class="profile-side">
        <div class="sidebar-card">
          <h4 class="sidebar-title">About</h4>
          <div class="about-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="about-joined">Joined ...</span>
          </div>
          <div class="about-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <span id="about-karma">0 tkpoints</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal-overlay" id="edit-modal" style="display:none">
    <div class="modal" style="max-width:480px">
      <div class="modal-header"><h3>Edit Profile</h3><button class="modal-close" onclick="closeEdit()">×</button></div>
      <div class="modal-body">
        <div class="form-group"><label style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px">Display Name</label><input type="text" id="edit-name" class="styled-input" /></div>
        <div class="form-group"><label style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px">Bio</label><textarea id="edit-bio" class="styled-textarea" rows="3" placeholder="Tell the community about yourself..."></textarea></div>
        <div class="form-group" style="margin-top:10px;">
          <label style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px">Select Avatar</label>
          <div class="avatar-selector" id="avatar-selector">
            <!-- Avatars will be rendered here by JS -->
          </div>
        </div>
        <div class="form-group" style="margin-top:15px;">
          <label style="font-size:.85rem;color:var(--text);display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="edit-public" style="width:16px;height:16px;accent-color:var(--accent);" />
            Make my profile public (visible to everyone)
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
        <button class="btn-post" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
